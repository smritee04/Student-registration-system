<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All Students — StudentReg Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../../css/style.css"/>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-placeholder"></div>
  <div class="main-area">
    <div id="topbar-placeholder"></div>

    <main class="page-content">
      <div class="card">
        <div class="card-header">
          <h2>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            All Students
          </h2>
          <div style="display:flex;gap:.65rem;align-items:center;flex-wrap:wrap">
            <div class="search-bar">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="search" id="searchInput" placeholder="Search students…"/>
            </div>
            <a href="register.html" class="btn btn-primary btn-sm">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add Student
            </a>
            <button class="btn btn-secondary btn-sm" onclick="loadStudents()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
              Refresh
            </button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Student ID</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Department</th>
                <th>Year</th>
                <th>Gender</th>
                <th>Registered</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="studentsTbody">
              <tr><td colspan="10"><div class="spinner-wrap"><div class="spinner"></div></div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="table-footer">
          <span id="tableFooter">Loading…</span>
          <span style="color:var(--clr-muted);font-size:.78rem"></span>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <h3>Edit Student Record</h3>
      <button class="btn-icon" id="editModalClose">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="editForm" novalidate>
        <input type="hidden" id="editId"/>
        <div class="form-grid">
          <div class="form-group">
            <label>Student ID</label>
            <input type="text" id="editStudentId" name="studentId" readonly style="background:var(--clr-bg);cursor:not-allowed"/>
            <span style="font-size:.76rem;color:var(--clr-muted)">Student ID cannot be changed.</span>
          </div>
          <div class="form-group">
            <label>Full Name <span style="color:var(--clr-danger)">*</span></label>
            <input type="text" id="editFullName" name="fullName"/>
            <span class="field-error" data-error="fullName"></span>
          </div>
          <div class="form-group">
            <label>Email <span style="color:var(--clr-danger)">*</span></label>
            <input type="email" id="editEmail" name="email"/>
            <span class="field-error" data-error="email"></span>
          </div>
          <div class="form-group">
            <label>Phone <span style="color:var(--clr-danger)">*</span></label>
            <input type="tel" id="editPhone" name="phone"/>
            <span class="field-error" data-error="phone"></span>
          </div>
          <div class="form-group">
            <label>Department <span style="color:var(--clr-danger)">*</span></label>
            <select id="editDepartment" name="department">
              <option value="">— Select —</option>
              <option>Computer Science</option>
              <option>Information Technology</option>
              <option>Electronics</option>
              <option>Mechanical</option>
              <option>Civil</option>
              <option>Electrical</option>
              <option>MBA</option>
              <option>MCA</option>
            </select>
          </div>
          <div class="form-group">
            <label>Year <span style="color:var(--clr-danger)">*</span></label>
            <select id="editYear" name="year">
              <option value="">— Select —</option>
              <option value="1">1st Year</option>
              <option value="2">2nd Year</option>
              <option value="3">3rd Year</option>
              <option value="4">4th Year</option>
            </select>
          </div>
          <div class="form-group">
            <label>Gender <span style="color:var(--clr-danger)">*</span></label>
            <select id="editGender" name="gender">
              <option value="">— Select —</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Reset Password (optional)</label>
            <input type="text" id="editPassword" name="password" placeholder="Leave blank to keep current"/>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="editCancelBtn">Cancel</button>
      <button class="btn btn-primary" id="editSaveBtn">Save Changes</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Delete Student</h3>
      <button class="btn-icon" id="deleteModalClose">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <p>Are you sure you want to permanently delete <strong id="deleteStudentName"></strong>? This cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="deleteCancelBtn">Cancel</button>
      <button class="btn btn-danger" id="deleteConfirmBtn">Delete Student</button>
    </div>
  </div>
</div>

<script src="../../js/store.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/sidebar.js"></script>
<script src="../../js/app.js"></script>
<script>
  let allStudents  = [];
  let deleteTarget = null;

document.addEventListener("DOMContentLoaded", async () => {
    const user = requireAuth("admin");
    if (!user) return;
    injectLayout("admin", "All Students");
    await loadStudents();
    initSearch();
    initModals();
  });

  async function loadStudents() {
    allStudents = await getStudents();
    renderTable(allStudents);
  }

  function renderTable(students) {
    const tbody  = document.getElementById("studentsTbody");
    const footer = document.getElementById("tableFooter");

    

    if (!students.length) {
      tbody.innerHTML = `
        <tr><td colspan="10">
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            <h3>No students yet</h3>
            <p>Add a student from <a href="/pages/admin/register.html">Register Student</a>.</p>
          </div>
        </td></tr>`;
      if (footer) footer.textContent = "0 records";
      return;
    }

    tbody.innerHTML = students.map((s, i) => `
      <tr>
        <td style="color:var(--clr-muted);font-size:.8rem">${i + 1}</td>
        <td><code style="font-family:monospace;font-size:.82rem;background:var(--clr-bg);padding:.15rem .4rem;border-radius:4px">${esc(s.studentId)}</code></td>
        <td><strong>${esc(s.fullName)}</strong></td>
        <td style="font-size:.83rem">${esc(s.email)}</td>
        <td style="font-size:.83rem">${esc(s.phone)}</td>
        <td><span class="badge badge-blue">${esc(s.department)}</span></td>
        <td>${yearBadge(s.year)}</td>
        <td>${genderBadge(s.gender)}</td>
        <td style="font-size:.78rem;color:var(--clr-muted)">${formatDate(s.createdAt)}</td>
        <td>
          <div class="actions-cell">
            <button class="btn-icon edit" title="Edit" onclick="openEditModal('${s.id}')">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="btn-icon delete" title="Delete" onclick="openDeleteModal('${s.id}', '${s.fullName}')"">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            </button>
          </div>
        </td>
      </tr>`).join("");

    if (footer) footer.textContent = `${students.length} record${students.length !== 1 ? "s" : ""}`;
  }

  function initSearch() {
    document.getElementById("searchInput")?.addEventListener("input", e => {
      const q = e.target.value.toLowerCase();
      renderTable(allStudents.filter(s =>
        Object.values(s).some(v => String(v).toLowerCase().includes(q))
      ));
    });
  }

  function openEditModal(id) {
  const s = allStudents.find(x => String(x.id) === String(id));
    if (!s) return;
    document.getElementById("editId").value          = s.id;
    document.getElementById("editStudentId").value   = s.studentId;
    document.getElementById("editFullName").value    = s.fullName;
    document.getElementById("editEmail").value       = s.email;
    document.getElementById("editPhone").value       = s.phone;
    document.getElementById("editDepartment").value  = s.department;
    document.getElementById("editYear").value        = s.year;
    document.getElementById("editGender").value      = s.gender;
    document.getElementById("editPassword").value    = "";
    document.getElementById("editModal").classList.add("open");
  }

  function openDeleteModal(id, name) {
    deleteTarget = id;
    document.getElementById("deleteStudentName").textContent = name;
    document.getElementById("deleteModal").classList.add("open");
  }

  function closeModal(id) {
    document.getElementById(id)?.classList.remove("open");
  }

  function initModals() {
    document.getElementById("editModalClose")?.addEventListener("click",  () => closeModal("editModal"));
    document.getElementById("editCancelBtn")?.addEventListener("click",   () => closeModal("editModal"));
    document.getElementById("editModal")?.addEventListener("click",async e => { if (e.target.id === "editModal") closeModal("editModal"); });

    document.getElementById("editSaveBtn")?.addEventListener("click", async () => {
      const btn = document.getElementById("editSaveBtn");
      btn.disabled = true; btn.textContent = "Saving…";

      const id      = document.getElementById("editId").value;
      const newPass = document.getElementById("editPassword").value.trim();
      const payload = {
        fullName:   document.getElementById("editFullName").value.trim(),
        email:      document.getElementById("editEmail").value.trim(),
        phone:      document.getElementById("editPhone").value.trim(),
        department: document.getElementById("editDepartment").value,
        year:       document.getElementById("editYear").value,
        gender:     document.getElementById("editGender").value,
      };
      if (newPass) payload.password = newPass;

    try {
        await updateStudent(id, payload);
        showToast("Student record updated.", "success");
        closeModal("editModal");
        await loadStudents();
      } catch (err) {
        showToast(err.message || "Update failed.", "error");
      } finally {
        btn.disabled = false; btn.textContent = "Save Changes";
      }
    });

    document.getElementById("deleteModalClose")?.addEventListener("click", () => closeModal("deleteModal"));
    document.getElementById("deleteCancelBtn")?.addEventListener("click",  () => closeModal("deleteModal"));
    document.getElementById("deleteModal")?.addEventListener("click", e => { if (e.target.id === "deleteModal") closeModal("deleteModal"); });
    document.getElementById("deleteConfirmBtn")?.addEventListener("click", async () => {
      const btn = document.getElementById("deleteConfirmBtn");
      btn.disabled = true; btn.textContent = "Deleting…";
     try {
        await deleteStudent(deleteTarget);
        showToast("Student deleted.", "success");
        closeModal("deleteModal");
        await loadStudents();
      } catch (err) {
        showToast(err.message || "Delete failed.", "error");
      } finally {
        btn.disabled = false; btn.textContent = "Delete Student";
      }
    });
  }
</script>
</body>
</html>
