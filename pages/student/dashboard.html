<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Dashboard — StudentReg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../../css/style.css"/>
</head>
<body>
<div class="app-layout">
  <div id="sidebar-placeholder"></div>
  <div class="main-area">
    <div id="topbar-placeholder"></div>

    <main class="page-content">

      <!-- WELCOME BANNER -->
      <div class="profile-header" style="margin-bottom:1.75rem">
        <div class="profile-avatar-lg" id="studentAvatar">S</div>
        <div class="profile-info">
          <h2 id="studentWelcome">Welcome back!</h2>
          <p id="studentSubtitle">Loading your details…</p>
        </div>
        <div class="profile-badge" id="studentDeptBadge" style="display:none"></div>
      </div>

      <!-- QUICK STATS -->
      <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:1.75rem">
        <div class="stat-card">
          <div class="stat-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
          </div>
          <div>
            <div class="stat-num" id="sdYear">—</div>
            <div class="stat-label">Academic Year</div>
          </div>
        </div>
        <div class="stat-card accent">
          <div class="stat-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </div>
          <div>
            <div class="stat-num" id="sdDept">—</div>
            <div class="stat-label">Department</div>
          </div>
        </div>
        <div class="stat-card success">
          <div class="stat-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div>
            <div class="stat-num">Active</div>
            <div class="stat-label">Enrollment Status</div>
          </div>
        </div>
      </div>

      <!-- PROFILE DETAILS CARD -->
      <div class="card">
        <div class="card-header">
          <h2>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            My Registration Details
          </h2>
          <a href="profile.html" class="btn btn-secondary btn-sm">View Full Profile</a>
        </div>
        <div class="card-body">
          <div class="info-grid" id="studentInfoGrid">
            <div class="spinner-wrap"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="../../js/store.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/sidebar.js"></script>
<script src="../../js/app.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const user = requireAuth("student");
    if (!user) return;
    injectLayout("student", "My Dashboard");

    const s = findStudentByStudentId(user.studentId);

    if (!s) {
      document.getElementById("studentWelcome").textContent  = `Welcome, ${user.name || user.studentId}`;
      document.getElementById("studentSubtitle").textContent = "Your registration details could not be found.";
      document.getElementById("studentInfoGrid").innerHTML   = `
        <p style="color:var(--clr-muted)">
          No registration record found. Please contact your administrator or
          <a href="/pages/student/register.html">complete your registration</a>.
        </p>`;
      return;
    }

    const initials = s.fullName?.charAt(0).toUpperCase() || "S";
    document.getElementById("studentAvatar").textContent       = initials;
    document.getElementById("studentWelcome").textContent      = `Welcome, ${s.fullName}`;
    document.getElementById("studentSubtitle").textContent     = `${s.studentId} · ${s.department}`;
    const deptBadge = document.getElementById("studentDeptBadge");
    deptBadge.textContent   = s.department;
    deptBadge.style.display = "inline-block";

    const yearLabels = { "1": "1st Year", "2": "2nd Year", "3": "3rd Year", "4": "4th Year" };
    document.getElementById("sdYear").textContent = yearLabels[s.year] || s.year;
    document.getElementById("sdDept").textContent = s.department?.split(" ")[0] || "—";

    document.getElementById("studentInfoGrid").innerHTML = `
      <div class="info-item"><div class="info-item-label">Student ID</div><div class="info-item-value">${esc(s.studentId)}</div></div>
      <div class="info-item"><div class="info-item-label">Full Name</div><div class="info-item-value">${esc(s.fullName)}</div></div>
      <div class="info-item"><div class="info-item-label">Email</div><div class="info-item-value">${esc(s.email)}</div></div>
      <div class="info-item"><div class="info-item-label">Phone</div><div class="info-item-value">${esc(s.phone)}</div></div>
      <div class="info-item"><div class="info-item-label">Department</div><div class="info-item-value">${esc(s.department)}</div></div>
      <div class="info-item"><div class="info-item-label">Year</div><div class="info-item-value">${yearLabels[s.year] || s.year}</div></div>
      <div class="info-item"><div class="info-item-label">Gender</div><div class="info-item-value">${esc(s.gender)}</div></div>
      <div class="info-item"><div class="info-item-label">Registered On</div><div class="info-item-value">${formatDate(s.createdAt)}</div></div>
    `;
  });
</script>
</body>
</html>
